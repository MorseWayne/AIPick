<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIPick - Deep Research 智能购物助手</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --sidebar-bg: #202123;
            --main-bg: #343541;
            --text-main: #ececf1;
            --text-secondary: #c5c5d2;
            --border-color: rgba(255, 255, 255, 0.1);
            --user-msg-bg: #343541;
            --ai-msg-bg: #444654;
            --accent: #10a37f; /* ChatGPT Green */
            --accent-hover: #1a7f64;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--main-bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            overflow: hidden;
        }

        .app-container {
            display: flex;
            width: 100%;
            height: 100%;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 260px;
            background-color: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            padding: 0.8rem;
            flex-shrink: 0;
            transition: transform 0.3s ease;
        }

        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            color: white;
            text-decoration: none;
        }

        .new-chat-btn:hover {
            background-color: rgba(255, 255, 255, 0.1);
        }

        .history-list {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .history-item {
            padding: 0.8rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: var(--text-secondary);
            transition: background 0.2s, color 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .history-item:hover {
            background-color: rgba(255, 255, 255, 0.05);
            color: white;
        }
        
        .history-item.active {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        /* Main Content Styles */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .header {
            padding: 0.8rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            background: var(--main-bg);
            z-index: 10;
        }

        .header h1 {
            font-size: 1rem;
            font-weight: 500;
        }

        .badge {
            font-size: 0.75rem;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
            background: rgba(16, 163, 127, 0.1);
            color: var(--accent);
            border: 1px solid rgba(16, 163, 127, 0.2);
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            scroll-behavior: smooth;
            padding-bottom: 150px; /* Space for input */
        }

        .chat-container::-webkit-scrollbar {
            width: 8px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
        }

        .message-row {
            width: 100%;
            display: flex;
            justify-content: center;
            padding: 1.5rem 1rem;
        }

        .message-row.ai {
            background-color: var(--ai-msg-bg);
        }

        .message-content {
            width: 100%;
            max-width: 800px;
            display: flex;
            gap: 1.5rem;
        }

        .avatar {
            width: 30px;
            height: 30px;
            border-radius: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-weight: bold;
            font-size: 0.8rem;
        }

        .avatar.user {
            background-color: #5436da;
        }

        .avatar.ai {
            background-color: var(--accent);
        }

        .message-text {
            flex: 1;
            line-height: 1.6;
            font-size: 1rem;
            overflow-wrap: break-word;
        }

        .status-card {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1rem;
            margin: 1rem 0;
            font-size: 0.9rem;
        }

        /* Input Area */
        .input-area {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(transparent, var(--main-bg) 20%);
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-box {
            background-color: #40414f;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 0.8rem 3rem 0.8rem 1rem;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            display: flex;
            align-items: flex-end;
        }

        textarea {
            width: 100%;
            background: transparent;
            border: none;
            color: white;
            resize: none;
            max-height: 200px;
            height: 24px;
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            line-height: 1.5;
        }

        .send-btn {
            position: absolute;
            right: 0.8rem;
            bottom: 0.8rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 4px;
            padding: 0.3rem;
            cursor: pointer;
            transition: background 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            background: transparent;
            color: #666;
            cursor: not-allowed;
        }

        /* Markdown Styling */
        .markdown-body h1, .markdown-body h2, .markdown-body h3 {
            margin: 1.5rem 0 1rem;
            color: white;
        }
        .markdown-body p { margin-bottom: 1rem; }
        .markdown-body ul, .markdown-body ol { margin-bottom: 1rem; padding-left: 1.5rem; }
        .markdown-body li { margin-bottom: 0.5rem; }
        
        /* Recommendation Card - ChatGPT Style */
        .recommendation-card {
            background: #444654;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1rem 0;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .action-btn {
            background: #40414f;
            border: 1px solid var(--border-color);
            color: white;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            text-decoration: none;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 0.5rem;
            margin-right: 0.5rem;
        }
        .action-btn:hover { background: #4e4f60; }

    </style>
</head>
<body>

    <div class="app-container">
        <aside class="sidebar">
            <a href="/" class="new-chat-btn">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
                开启新对话
            </a>
            <div class="history-list" id="historyList">
                <!-- History items will be loaded here -->
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <h1>AIPick <span class="badge" id="connStatus">已连接</span></h1>
            </header>

            <div class="chat-container" id="chat">
                <div class="message-row ai">
                    <div class="message-content">
                        <div class="avatar ai">AI</div>
                        <div class="message-text">
                            欢迎使用 AIPick 深度调研购物助手。您可以输入您的购物需求，我会为您进行全网搜索并从小红书提取真实评价。
                        </div>
                    </div>
                </div>
            </div>

            <div class="input-area">
                <div class="input-wrapper">
                    <div class="input-box">
                        <textarea id="userInput" placeholder="输入购物需求..." rows="1" onkeydown="handleEnter(event)"></textarea>
                        <button class="send-btn" id="sendBtn" onclick="sendReq()">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                        </button>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script>
        const chat = document.getElementById('chat');
        const input = document.getElementById('userInput');
        const historyList = document.getElementById('historyList');
        const connStatus = document.getElementById('connStatus');
        
        let ws;
        let isWaitingForAnswer = false;
        let currentStatusBox = null;

        function connect() {
            const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${window.location.host}/ws`);

            ws.onopen = () => {
                connStatus.innerText = '已连接';
                connStatus.style.color = '#10a37f';
            };

            ws.onclose = () => {
                connStatus.innerText = '已断开';
                connStatus.style.color = '#ef4444';
                setTimeout(connect, 3000);
            };

            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                handleMessage(data);
            };
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const history = await res.json();
                historyList.innerHTML = '';
                history.forEach(item => {
                    const el = document.createElement('div');
                    el.className = 'history-item';
                    el.innerHTML = `
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                        ${item.query}
                    `;
                    el.onclick = () => loadSession(item.id);
                    historyList.appendChild(el);
                });
            } catch (e) {
                console.error("Failed to load history", e);
            }
        }

        async function loadSession(sessionId) {
            try {
                const res = await fetch(`/api/session/${sessionId}`);
                const data = await res.json();
                
                // Clear chat and display results
                chat.innerHTML = '';
                addMessage(data.session.query, 'user');
                
                if (data.session.intent) {
                    renderIntent(data.session.intent);
                }
                
                if (data.session.final_report) {
                    renderFinalReport(data.session.final_report, data.session.md_path);
                }

                // Scroll to bottom
                scrollToBottom();
                
                // Set active in history
                document.querySelectorAll('.history-item').forEach(el => el.classList.remove('active'));
                event.currentTarget.classList.add('active');
            } catch (e) {
                console.error("Failed to load session", e);
            }
        }

        function handleMessage(data) {
            if (data.type === 'status') {
                updateOrCreateStatus(data.stage, data.message);
            } else if (data.type === 'info' || data.type === 'warning') {
                appendToStatus(data.message, data.type === 'warning');
            } else if (data.type === 'question' || data.type === 'request_input') {
                isWaitingForAnswer = true;
                if (currentStatusBox) {
                    currentStatusBox.querySelector('.spinner').style.display = 'none';
                    currentStatusBox = null;
                }
                addMessage(`**🙋 顾问追问:** ${data.reason || ''}\n\n${data.question || data.prompt}`, 'ai');
            } else if (data.type === 'intent') {
                renderIntent(data.data);
            } else if (data.type === 'completed') {
                if (currentStatusBox) {
                    currentStatusBox.querySelector('.spinner').style.display = 'none';
                    currentStatusBox = null;
                }
                renderFinalReport(data.final_report, data.md_path);
                loadHistory(); // Refresh history
            } else if (data.type === 'error') {
                addMessage(`❌ **发生错误:** ${data.message}`, 'ai');
            }
        }

        function renderIntent(intent) {
            const html = `
                <div style="font-weight: 500; margin-bottom: 0.5rem;">📋 需求分析档案：</div>
                <div style="font-size: 0.9em; opacity: 0.9;">
                    • 目标商品: <strong>${intent.category || '未指定'}</strong><br>
                    • 预算范围: <strong>${intent.budget || '不限'}</strong><br>
                    • 核心需求: <strong>${(intent.core_needs||[]).join(', ') || '通用'}</strong>
                </div>
            `;
            addMessage(html, 'ai');
        }

        function renderFinalReport(report, mdPath) {
            let html = `🎉 **为您生成的推荐榜单：**\n\n`;
            report.recommendations.forEach((r, i) => {
                const medal = ["🥇", "🥈", "🥉"][i] || "🏅";
                html += `
<div class="recommendation-card">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
        <h3 style="margin: 0; color: white;">${medal} ${r.product_name}</h3>
        <span style="font-size: 0.8rem; padding: 0.2rem 0.5rem; background: rgba(255,255,255,0.1); border-radius: 4px;">置信度: ${r.confidence_level}</span>
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem;">
        <div style="background: rgba(16, 163, 127, 0.1); padding: 0.5rem; border-radius: 4px; text-align: center;">
            <div style="font-size: 0.7rem; color: #10a37f;">推荐指数</div>
            <div style="font-size: 1.2rem; font-weight: 600;">${r.recommendation_index}</div>
        </div>
        <div style="background: rgba(255, 255, 255, 0.05); padding: 0.5rem; border-radius: 4px; text-align: center;">
            <div style="font-size: 0.7rem; color: #ccc;">性价比</div>
            <div style="font-size: 1.2rem; font-weight: 600;">${r.cost_performance}</div>
        </div>
    </div>
    <div style="font-size: 0.9rem; margin-bottom: 0.5rem;"><span style="color: #4ade80;">✔</span> ${r.pros.join('；')}</div>
    <div style="font-size: 0.9rem; margin-bottom: 1rem;"><span style="color: #f87171;">✘</span> ${r.cons.join('；')}</div>
    <p style="font-size: 0.9rem; color: #ccc; font-style: italic;">💡 ${r.summary}</p>
</div>`;
            });

            if (mdPath) {
                html += `
                    <div style="margin-top: 1rem;">
                        <a href="/${mdPath}" target="_blank" class="action-btn">查看完整报告</a>
                        <a href="/${mdPath}" download class="action-btn">下载 Markdown</a>
                    </div>
                `;
            }
            addMessage(html, 'ai');
        }

        function addMessage(textOrHtml, sender) {
            const row = document.createElement('div');
            row.className = `message-row ${sender}`;
            
            const content = document.createElement('div');
            content.className = 'message-content';
            
            const avatar = document.createElement('div');
            avatar.className = `avatar ${sender}`;
            avatar.innerText = sender === 'user' ? 'U' : 'AI';
            
            const text = document.createElement('div');
            text.className = 'message-text markdown-body';
            
            if (sender === 'user') {
                text.innerText = textOrHtml;
            } else {
                text.innerHTML = marked.parse(textOrHtml);
            }
            
            content.appendChild(avatar);
            content.appendChild(text);
            row.appendChild(content);
            chat.appendChild(row);
            scrollToBottom();
        }

        function updateOrCreateStatus(stage, msg) {
            if (!currentStatusBox || currentStatusBox.dataset.stage !== stage) {
                if (currentStatusBox) {
                    currentStatusBox.querySelector('.spinner').style.display = 'none';
                }
                const el = document.createElement('div');
                el.className = 'status-card';
                el.dataset.stage = stage;
                el.innerHTML = `<div><span class="spinner"></span><strong>[${stage}]</strong> ${msg}</div><div class="status-log" style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.7; max-height: 100px; overflow-y: auto;"></div>`;
                
                const row = document.createElement('div');
                row.className = 'message-row ai';
                const content = document.createElement('div');
                content.className = 'message-content';
                content.innerHTML = '<div class="avatar ai">AI</div>';
                const text = document.createElement('div');
                text.className = 'message-text';
                text.appendChild(el);
                content.appendChild(text);
                row.appendChild(content);
                
                chat.appendChild(row);
                currentStatusBox = el;
                scrollToBottom();
            } else {
                currentStatusBox.firstChild.innerHTML = `<span class="spinner"></span><strong>[${stage}]</strong> ${msg}`;
            }
        }

        function appendToStatus(msg, isWarning) {
            if (!currentStatusBox) return;
            const log = currentStatusBox.querySelector('.status-log');
            const d = document.createElement('div');
            if (isWarning) d.style.color = '#facc15';
            d.innerText = msg;
            log.appendChild(d);
            log.scrollTop = log.scrollHeight;
        }

        function sendReq() {
            const text = input.value.trim();
            if (!text) return;

            addMessage(text, 'user');
            input.value = '';
            input.style.height = '24px';

            if (isWaitingForAnswer) {
                ws.send(JSON.stringify({ type: 'answer', content: text }));
                isWaitingForAnswer = false;
            } else {
                ws.send(JSON.stringify({ type: 'query', content: text }));
            }
        }

        function handleEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendReq();
            }
        }

        input.addEventListener('input', function() {
            this.style.height = '24px';
            this.style.height = (this.scrollHeight) + 'px';
        });

        function scrollToBottom() {
            chat.scrollTop = chat.scrollHeight;
        }

        window.onload = () => {
            connect();
            loadHistory();
        };
    </script>
</body>
</html>
